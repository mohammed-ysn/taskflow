version: "3"

vars:
  LINT_DIRS: src tests examples

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install deps
    cmds:
      - uv sync --all-groups

  # ---- Code quality ----

  format:
    desc: Format code with ruff
    cmds:
      - uv run --dev ruff format {{.LINT_DIRS}}

  lint:
    desc: Format, lint (auto-fix), and type-check
    cmds:
      - uv run --dev ruff format {{.LINT_DIRS}}
      - uv run --dev ruff check --fix {{.LINT_DIRS}}
      - uv run --dev ty check src

  typecheck:
    desc: Type-check with ty
    cmds:
      - uv run --dev ty check src

  check:
    desc: Lint and type-check without modifying files (CI mode)
    cmds:
      - uv run --dev ruff check {{.LINT_DIRS}}
      - uv run --dev ty check src

  # ---- Tests ----

  test:
    desc: "Run all tests (extra args: task test -- -k test_name -x)"
    cmds:
      - uv run --dev pytest tests/ -v {{.CLI_ARGS}}

  test:unit:
    desc: "Run unit tests only (extra args: task test:unit -- -k test_name)"
    cmds:
      - uv run --dev pytest tests/unit/ -v {{.CLI_ARGS}}

  test:perf:
    desc: Run performance tests only
    cmds:
      - uv run --dev pytest tests/performance/ -v {{.CLI_ARGS}}

  # ---- CI ----

  ci:
    desc: Full CI pipeline — check and test without auto-fixing
    cmds:
      - task: check
      - task: test

  # ---- Redis ----

  redis:up:
    desc: Start Redis via Docker Compose
    cmds:
      - docker-compose up -d

  redis:down:
    desc: Stop Redis
    cmds:
      - docker-compose down

  redis:logs:
    desc: Tail Redis logs
    cmds:
      - docker-compose logs -f redis

  redis:flush:
    desc: Flush all Redis keys (clears queues and DLQ)
    cmds:
      - docker exec taskflow-redis-1 redis-cli FLUSHDB

  # ---- Worker ----

  worker:
    desc: "Start worker (extra flags: task worker -- -q high -q default -c 10)"
    cmds:
      - uv run taskflow worker -q default -c 5 {{.CLI_ARGS}}

  # ---- Examples ----

  example:basic:worker:
    desc: "Basic example — run worker"
    cmds:
      - uv run python examples/basic.py worker {{.CLI_ARGS}}

  example:basic:submit:
    desc: "Basic example — submit tasks"
    cmds:
      - uv run python examples/basic.py submit {{.CLI_ARGS}}

  example:priorities:worker:
    desc: "Priority queues — run worker (concurrency=1 shows ordering)"
    cmds:
      - uv run python examples/priorities.py worker --concurrency 1 {{.CLI_ARGS}}

  example:priorities:submit:
    desc: "Priority queues — submit tasks at different priorities"
    cmds:
      - uv run python examples/priorities.py submit {{.CLI_ARGS}}

  example:retries:worker:
    desc: "Retries + DLQ — run worker"
    cmds:
      - uv run python examples/retries.py worker {{.CLI_ARGS}}

  example:retries:submit:
    desc: "Retries + DLQ — submit flaky and always-failing tasks"
    cmds:
      - uv run python examples/retries.py submit {{.CLI_ARGS}}

  example:retries:dlq:
    desc: "Retries + DLQ — inspect dead letter queue"
    cmds:
      - uv run python examples/retries.py inspect-dlq {{.CLI_ARGS}}

  example:timeout:worker:
    desc: "Timeout — run worker"
    cmds:
      - uv run python examples/timeout.py worker {{.CLI_ARGS}}

  example:timeout:submit:
    desc: "Timeout — submit fast and slow (timing-out) tasks"
    cmds:
      - uv run python examples/timeout.py submit {{.CLI_ARGS}}

  example:middleware:
    desc: "Middleware — demo rate limiter and circuit breaker"
    cmds:
      - uv run python examples/middleware.py demo {{.CLI_ARGS}}

  example:scheduling:
    desc: "Scheduling — demo delayed, periodic, and cron tasks"
    cmds:
      - uv run python examples/scheduling.py demo {{.CLI_ARGS}}

  # ---- Dev ----

  dev:
    desc: Install deps and start Redis
    deps: [install, redis:up]
    cmds:
      - echo "Ready — see 'task --list' for available examples"

  clean:
    desc: Remove build artefacts and caches
    cmds:
      - find . -type d \( -name __pycache__ -o -name .pytest_cache -o -name .ruff_cache \) -exec rm -rf {} + 2>/dev/null || true
      - find . -name "*.pyc" -delete 2>/dev/null || true
    silent: true
